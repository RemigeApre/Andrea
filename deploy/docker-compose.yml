services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:4321"
    environment:
      HOST: "0.0.0.0"
      PORT: "4321"
      DIRECTUS_URL: "http://directus:8055"
      DIRECTUS_STATIC_TOKEN: "${DIRECTUS_STATIC_TOKEN}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      NOTIFY_EMAIL: "${NOTIFY_EMAIL}"
    depends_on:
      - directus

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - ../backend/database:/directus/database
      - ../backend/uploads:/directus/uploads
      - ../backend/snapshots:/directus/snapshots
    environment:
      SECRET: "${SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      PUBLIC_URL: "https://simonet-davin.fr/cms"
