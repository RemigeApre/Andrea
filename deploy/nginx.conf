server {
    listen 80;
    listen [::]:80;
    server_name simonet-davin.fr www.simonet-davin.fr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name simonet-davin.fr www.simonet-davin.fr;

    # SSL — adapter les chemins selon Certbot / Nginx Proxy Manager
    ssl_certificate /etc/letsencrypt/live/simonet-davin.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simonet-davin.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Headers sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Frontend Astro (SSR)
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Assets statiques — cache long
    location /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers publics
    location ~* \.(woff2|webp|png|jpg|svg|ico|txt|xml)$ {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Directus admin (optionnel, accès interne)
    location /cms/ {
        proxy_pass http://127.0.0.1:8055/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
